name: DCL AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    uses: agustincarriso/dcl-pr-reviewer/.github/workflows/review.yml@main
    with:
      review_mode: summary
      max_diff_chars: "45000"
    secrets: inherit
